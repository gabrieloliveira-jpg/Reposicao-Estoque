<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reposição de Estoque</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#181c26;--bg3:#1e2231;--bg4:#252a3a;
  --border:#2d3348;--border2:#3a4060;
  --text:#e8eaf0;--text2:#9aa0b8;--text3:#5a6080;
  --blue:#4d7cfe;--blue2:#1a2d6e;--blue3:#0d1a42;
  --green:#2dd4a0;--green2:#0d4a38;
  --amber:#f5a623;--amber2:#4a3200;
  --red:#f05454;--red2:#4a0f0f;
  --mono:'Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:2rem 1rem}
h1{font-size:22px;font-weight:600;letter-spacing:-0.3px}
.container{max-width:860px;margin:0 auto}
.header{margin-bottom:2rem}
.header p{margin-top:6px;font-size:14px;color:var(--text3)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.section-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans)}
.btn:hover{background:var(--bg4)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:var(--blue3);border-color:var(--blue);color:#a8c4ff}
.btn-primary:hover{background:#1a2d6e}
.btn-debug{background:var(--amber2);border-color:var(--amber);color:var(--amber);font-size:12px;padding:6px 12px}
.btn-copy.ok{border-color:var(--green);color:var(--green)}
.tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;background:var(--blue3);color:#7ba8ff;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--text3);max-height:160px;overflow-y:auto;margin-top:10px}
.log-line.ok{color:var(--green)}
.log-line.warn{color:var(--amber)}
.log-line.err{color:var(--red)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:12px;color:var(--text3);margin-bottom:4px}
.stat-val{font-size:26px;font-weight:600}
.stat-val.red{color:var(--red)}
.stat-val.amber{color:var(--amber)}
.stat-val.blue{color:var(--blue)}
.stat-val.green{color:var(--green)}
.output-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1rem}
.output-header{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border)}
.output-title{font-size:13px;font-weight:500}
.section-header{font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px}
.sku-line{padding:5px 0;font-size:13px;font-family:var(--mono);color:var(--text);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.03)}
.sku-line:last-child{border-bottom:none}
.sku-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-family:var(--sans);white-space:nowrap}
.badge-red{background:var(--red2);color:var(--red)}
.badge-amber{background:var(--amber2);color:var(--amber)}
.badge-blue{background:var(--blue3);color:#7ba8ff}
.badge-green{background:var(--green2);color:var(--green)}
.badge-gray{background:var(--bg4);color:var(--text2)}
.notice{font-size:12px;color:var(--text3);margin-top:8px;padding:10px 14px;border:1px solid var(--amber2);background:rgba(245,166,35,0.05);border-radius:8px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.file-drop{border:1px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px}
.file-drop:hover,.file-drop.drag{border-color:var(--blue);background:rgba(77,124,254,0.04)}
.file-drop p{font-size:13px;color:var(--text3);margin-top:6px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
input[type=file]{display:none}
.debug-box{background:var(--bg);border:1px solid var(--amber2);border-radius:8px;padding:12px;margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--text2);max-height:300px;overflow-y:auto;display:none}
.debug-box table{width:100%;border-collapse:collapse}
.debug-box td,.debug-box th{padding:3px 8px;border:1px solid var(--border);text-align:left;font-size:11px}
.debug-box th{color:var(--amber);background:var(--amber2)}
.tabs{display:flex;gap:4px;margin-bottom:1rem}
.tab{padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2)}
.tab.active{background:var(--blue3);border-color:var(--blue);color:#a8c4ff}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Reposição de Estoque</h1>
    <p>Análise automática · Planilha Fluxo + Catálogos PDF</p>
  </div>

  <div class="card">
    <div class="section-label">Catálogos PDF dos fornecedores</div>
    <div class="file-drop" id="dropzone" onclick="document.getElementById('pdfInput').click()">
      <svg width="28" height="28" fill="none" stroke="#5a6080" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 15V3m0 12-4-4m4 4 4-4M2 17l.621 2.485A2 2 0 0 0 4.561 21H19.44a2 2 0 0 0 1.94-1.515L22 17"/></svg>
      <p>Arraste PDFs aqui ou clique para selecionar</p>
      <p style="font-size:11px;margin-top:4px">Até 5 fornecedores por análise</p>
    </div>
    <input type="file" id="pdfInput" multiple accept=".pdf" onchange="handleFiles(this.files)">
    <div class="tags" id="fileTags"></div>
    <hr class="divider">
    <div class="row">
      <button class="btn btn-primary" id="runBtn" onclick="runAnalysis()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4V8z"/></svg>
        Rodar Análise
      </button>
      <button class="btn btn-debug" onclick="runDebug()">
        🔍 Diagnóstico de colunas
      </button>
      <button class="btn" onclick="clearAll()">Limpar</button>
    </div>
    <div class="log" id="log" style="display:none"></div>
    <div class="debug-box" id="debugBox"></div>
  </div>

  <div id="statsArea" style="display:none"></div>
  <div id="outputArea" style="display:none"></div>
</div>

<script>
const SHEET_ID = "1404SCPiabg6abXRphpHqGXQ0frRkIlUptDV9m8a-x3w";
let pdfFiles = [];

function sheetUrl(aba) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(aba)}`;
}

async function fetchSheet(aba) {
  const r = await fetch(sheetUrl(aba));
  if (!r.ok) throw new Error("Erro ao buscar aba: " + aba);
  return parseCSV(await r.text());
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur); cur = ""; continue; }
      cur += c;
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows.slice(1);
}

function pn(v) {
  if (!v && v !== 0) return 0;
  const s = String(v).replace(/\./g,"").replace(",",".").replace(/[^\d.-]/g,"");
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function ns(s) { return String(s||"").trim().toUpperCase(); }
function normStrip(s) { return s.replace(/[\s\/\.\-]/g,"").toUpperCase(); }

function editDist(a,b) {
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function knupMap(sku) {
  let s = sku;
  if (/^G-[HBA]/i.test(s) && !/G-GT|G-RX|G-VR/i.test(s)) s = s.replace(/^G-/,"KP-");
  s = s.replace(/\/K$/i,"");
  s = s.replace(/\//g,"-");
  return s;
}

function matchSku(sku, catalog) {
  const keys = Object.keys(catalog);
  const try1 = (k) => catalog[k] != null ? {key:k,pcsCx:catalog[k]} : null;
  const norm = ns(sku);
  if (try1(norm)) return try1(norm);
  const kn = ns(knupMap(norm));
  if (try1(kn)) return try1(kn);
  const wd = norm.replace(/\//g,"-");
  if (try1(wd)) return try1(wd);
  const np = norm.includes("-") ? norm.slice(norm.indexOf("-")+1) : null;
  if (np && try1(np)) return try1(np);
  if (np && try1("-"+np)) return try1("-"+np);
  const sn = normStrip(norm);
  const sm = keys.find(k => normStrip(k) === sn);
  if (sm) return try1(sm);
  const sfx = keys.find(k => norm.startsWith(k) && norm.length-k.length<=3);
  if (sfx) return try1(sfx);
  const fz = keys.find(k => editDist(norm,k)<=2);
  if (fz) return try1(fz);
  return null;
}

async function readPdfText(file) {
  return new Promise(resolve => {
    const fr = new FileReader();
    fr.onload = async (e) => {
      try {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        const pdf = await pdfjsLib.getDocument({data: new Uint8Array(e.target.result)}).promise;
        let text = "";
        for (let p=1;p<=pdf.numPages;p++) {
          const page = await pdf.getPage(p);
          const c = await page.getTextContent();
          text += c.items.map(i=>i.str).join(" ") + "\n";
        }
        resolve(text);
      } catch(err) { resolve(""); }
    };
    fr.readAsArrayBuffer(file);
  });
}

function extractCatalog(text) {
  const catalog = {};
  const lines = text.split(/\r?\n/);
  const bad = ["ESGOTADO","SEM EMBALAGEM","FORA DA EMBALAGEM","INDISPONIVEL","INDISPONÍVEL","EM FALTA"];
  const skuRe = /\b([A-Z0-9][A-Z0-9\-\/]{2,}[A-Z0-9])\b/g;
  const pcsRe = /(?:PCS\/CX|UN\/CX|UNIT\/BOX|QTD\s*CX|EMBALAGEM)[:\s]*(\d+)|CX\s*C\/\s*(\d+)|(?<!\$)\b([1-9]\d{0,2})\b(?!\s*%)/;
  for (let i=0;i<lines.length;i++) {
    const lineUp = lines[i].toUpperCase();
    if (bad.some(w=>lineUp.includes(w))) continue;
    const skus = [...lineUp.matchAll(skuRe)].map(m=>m[1]);
    for (const sku of skus) {
      if (sku in catalog) continue;
      const win = lines.slice(i,Math.min(i+20,lines.length)).join("\n").toUpperCase();
      const m = win.match(pcsRe);
      let pcsCx = 1;
      if (m) { const v = parseInt(m[1]||m[2]||m[3]||"0"); if (v>0&&v<=500) pcsCx=v; }
      catalog[ns(sku)] = pcsCx;
    }
  }
  return catalog;
}

function analyze(fluxo, inativos, catalog) {
  const inSet = new Set(inativos.map(r=>ns(r[0]||r[1]||"")));

  const skus = fluxo.map(r=>({
    sku: ns(r[2]),
    fornecedor: String(r[1]||"").trim(),
    estoque: pn(r[5]),
    d7: pn(r[7]),
    d30: pn(r[8]),
    reserva: pn(r[14]),
    inativo: String(r[15]||"").trim().toUpperCase(),
    classif: String(r[18]||"").trim(),
    fat: pn(r[19]),
    lucro: pn(r[20]),
  })).filter(s =>
    s.sku &&
    !s.sku.startsWith("KIT") &&
    !inSet.has(s.sku) &&
    s.inativo !== "SIM" && s.inativo !== "1" && s.inativo !== "TRUE"
  );

  const cat={critica:[],estrela:[],outros:[],sem:[],sugestao:[],fora:[],pendente:[]};
  const used = new Set();

  for (const s of skus) {
    // Calcular margem — se sem dados, tratar como margem OK (incluir normalmente)
    let mg = null;
    if (s.fat > 0) mg = s.lucro / s.fat;
    // Se margem calculada < 15%, pular
    if (mg !== null && mg < 0.15) continue;
    const rev = mg !== null && mg < 0.20;

    const match = matchSku(s.sku, catalog);
    const inCat = match != null;
    const pcsCx = match ? match.pcsCx : 1;
    const vel = s.d30 > 0 ? s.d30/30 : s.d7 > 0 ? s.d7/7 : 0;

    // Etapa 1 — Reposição Crítica
    if (s.estoque === 0 && s.d30 > 0 && inCat) {
      cat.critica.push({...s, rev}); used.add(s.sku); continue;
    }

    const cu = s.classif.toUpperCase();
    const isEstr = cu === "ESTRELA" || cu === "PREMIUM";
    const isOut = ["","-","ANÁLISE","ANALISE","POTENCIAL","VOLUME"].includes(cu);

    // Etapa 2 — Estrela
    if (isEstr) {
      let need=false, cx=0;
      if (s.reserva > 0) {
        need = s.reserva <= 14;
        if (need && vel > 0) cx = Math.ceil((30 - s.reserva) * vel / pcsCx);
      } else {
        need = s.estoque - s.d30 < 0;
        if (need && vel > 0) cx = Math.ceil((30*vel - s.estoque) / pcsCx);
      }
      if (need && cx > 0) {
        if (inCat) cat.estrela.push({...s,cx,pcsCx,rev});
        else if (vel > 0) cat.fora.push({...s,nec:Math.ceil((30-Math.max(s.reserva,0))*vel),rev});
        used.add(s.sku); continue;
      }
    }

    // Etapa 3 — Outros
    if (isOut) {
      let need=false, cx=0;
      if (s.reserva > 0) {
        need = s.reserva <= 14;
        if (need && vel > 0) cx = Math.ceil((21 - s.reserva) * vel / pcsCx);
      } else {
        need = s.estoque - s.d7 < 0;
        if (need && vel > 0) cx = Math.ceil((21*vel - s.estoque) / pcsCx);
      }
      if (need && cx > 0) {
        if (inCat) cat.outros.push({...s,cx,pcsCx,rev});
        else if (vel > 0) cat.fora.push({...s,nec:Math.ceil(21*vel),rev});
        used.add(s.sku); continue;
      }
    }

    // Etapa 5 — Sem Estoque
    if (s.estoque === 0 && inCat && !used.has(s.sku)) {
      cat.sem.push({...s,rev}); used.add(s.sku); continue;
    }

    // Etapa 6 — Sugestão preventiva
    if (!used.has(s.sku) && s.estoque > 0 && vel > 0) {
      const dias = s.estoque / vel;
      if (dias <= 10) {
        const cx = Math.ceil(vel * 10 / pcsCx);
        if (inCat) cat.sugestao.push({...s,cx,pcsCx,rev});
        else cat.fora.push({...s,nec:Math.ceil(vel*10),rev});
        used.add(s.sku);
      }
    }
  }
  return cat;
}

// ---- DIAGNÓSTICO ----
async function runDebug() {
  const box = document.getElementById("debugBox");
  box.style.display = "block";
  box.innerHTML = "<p style='color:var(--amber)'>Carregando primeiras linhas da planilha...</p>";
  try {
    const rows = await fetchSheet("Visão Geral");
    const sample = rows.slice(0, 5);
    if (!sample.length) { box.innerHTML = "<p style='color:var(--red)'>Nenhuma linha encontrada.</p>"; return; }
    const maxCols = Math.max(...sample.map(r=>r.length));
    let html = "<p style='color:var(--amber);margin-bottom:8px'>Primeiras 5 linhas · índice das colunas (base 0):</p><table><tr><th>Idx</th>";
    for (let i=0;i<sample.length;i++) html += `<th>Linha ${i+1}</th>`;
    html += "</tr>";
    for (let c=0;c<maxCols;c++) {
      const highlight = [1,2,5,7,8,14,15,18,19,20].includes(c) ? "color:var(--green)" : "";
      html += `<tr><td style="${highlight};font-weight:bold">${c}</td>`;
      for (const row of sample) html += `<td style="${highlight}">${(row[c]||"").substring(0,30)}</td>`;
      html += "</tr>";
    }
    html += "</table><p style='color:var(--text3);margin-top:8px;font-size:10px'>Verde = colunas esperadas pelo sistema</p>";
    box.innerHTML = html;
  } catch(e) {
    box.innerHTML = `<p style='color:var(--red)'>Erro: ${e.message}</p>`;
  }
}

// ---- RENDER ----
function renderOutput(cat) {
  const statsArea = document.getElementById("statsArea");
  const outputArea = document.getElementById("outputArea");
  statsArea.style.display = "grid";
  statsArea.className = "stats";
  statsArea.innerHTML = [
    {label:"Reposição Crítica",val:cat.critica.length,cls:"red"},
    {label:"Estrela (mês)",val:cat.estrela.length,cls:"amber"},
    {label:"Outros (semana)",val:cat.outros.length,cls:"blue"},
    {label:"Sem Estoque",val:cat.sem.length,cls:"green"},
    {label:"Sugestão",val:cat.sugestao.length,cls:"blue"},
    {label:"Fora Catálogo",val:cat.fora.length,cls:"amber"},
    {label:"Margem Pendente",val:cat.pendente.length,cls:"red"},
  ].map(s=>`<div class="stat"><div class="stat-label">${s.label}</div><div class="stat-val ${s.cls}">${s.val}</div></div>`).join("");

  let rawText = "";
  const sections = [
    {key:"critica",title:"Reposicao Critica",fmt:i=>`${i.sku}${i.rev?" (revisar margem)":""}`,badge:"badge-red",bl:"Crítico"},
    {key:"estrela",title:"Produtos Mes (Estrela)",fmt:i=>`${i.sku} ${i.cx}cx [${i.pcsCx}un/cx]${i.rev?" (revisar margem)":""}`,badge:"badge-amber",bl:"Estrela"},
    {key:"outros",title:"Produtos Semana (Outros)",fmt:i=>`${i.sku} ${i.cx}cx${i.rev?" (revisar margem)":""}`,badge:"badge-blue",bl:"Outros"},
    {key:"sem",title:"Sem Estoque",fmt:i=>`${i.sku}${i.rev?" (revisar margem)":""}`,badge:"badge-gray",bl:"Sem Estoque"},
    {key:"sugestao",title:"Sugestao",fmt:i=>`${i.sku} ${i.cx}cx${i.rev?" (revisar margem)":""}`,badge:"badge-blue",bl:"Sugestão"},
    {key:"fora",title:"Fora do Catalogo",fmt:i=>`${i.sku} ${i.nec}un${i.rev?" (revisar margem)":""}`,badge:"badge-gray",bl:"Fora Cat."},
    {key:"pendente",title:"Margem Pendente",fmt:i=>i.sku,badge:"badge-gray",bl:"Pendente"},
  ];

  let html = `<div class="output-box"><div class="output-header"><span class="output-title">Resultado do Pedido</span><button class="btn btn-copy" id="copyBtn" onclick="copyOutput()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copiar tudo</button></div><div style="padding:1rem 1.25rem">`;

  for (const sec of sections) {
    const items = cat[sec.key];
    if (!items.length) continue;
    rawText += sec.title + ":\n";
    html += `<div style="margin-bottom:1rem"><div class="section-header">${sec.title}</div>`;
    for (const item of items) {
      const line = sec.fmt(item);
      rawText += line + "\n";
      const hasRev = line.includes("(revisar margem)");
      const mainPart = line.replace(" (revisar margem)","");
      html += `<div class="sku-line"><span>${mainPart}</span><span>${hasRev?`<span class="sku-badge badge-amber">revisar margem</span>`:`<span class="sku-badge ${sec.badge}">${sec.bl}</span>`}</span></div>`;
    }
    html += `</div>`;
    rawText += "\n";
  }

  html += `</div></div>`;
  outputArea.innerHTML = html + `<div class="notice">⚠ Verifique manualmente: KITs · Produtos já pedidos (em recebimento) · Planilha sem filtros ativos</div>`;
  outputArea.style.display = "block";
  window._rawOutput = rawText.trim();
}

function copyOutput() {
  if (!window._rawOutput) return;
  navigator.clipboard.writeText(window._rawOutput).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.classList.add("ok");
    btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copiado!`;
    setTimeout(() => {
      btn.classList.remove("ok");
      btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar tudo`;
    }, 2500);
  });
}

function addLog(msg, type="") {
  const log = document.getElementById("log");
  log.style.display = "block";
  const d = document.createElement("div");
  d.className = "log-line" + (type?" "+type:"");
  d.textContent = msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function handleFiles(files) {
  pdfFiles = Array.from(files).slice(0,5);
  const tags = document.getElementById("fileTags");
  tags.innerHTML = "";
  pdfFiles.forEach(f => {
    const t = document.createElement("span");
    t.className = "tag"; t.title = f.name; t.textContent = f.name;
    tags.appendChild(t);
  });
}

const dz = document.getElementById("dropzone");
dz.addEventListener("dragover", e=>{e.preventDefault();dz.classList.add("drag");});
dz.addEventListener("dragleave", ()=>dz.classList.remove("drag"));
dz.addEventListener("drop", e=>{e.preventDefault();dz.classList.remove("drag");handleFiles(e.dataTransfer.files);});

function clearAll() {
  pdfFiles = [];
  document.getElementById("fileTags").innerHTML = "";
  document.getElementById("pdfInput").value = "";
  document.getElementById("log").innerHTML = "";
  document.getElementById("log").style.display = "none";
  document.getElementById("debugBox").style.display = "none";
  document.getElementById("statsArea").style.display = "none";
  document.getElementById("outputArea").style.display = "none";
  window._rawOutput = "";
}

async function runAnalysis() {
  const btn = document.getElementById("runBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> Analisando...`;
  document.getElementById("log").innerHTML = "";
  document.getElementById("statsArea").style.display = "none";
  document.getElementById("outputArea").style.display = "none";

  try {
    addLog("Buscando planilha Fluxo (Visão Geral)...");
    const fluxo = await fetchSheet("Visão Geral");
    addLog(`${fluxo.length} linhas carregadas.`, "ok");

    addLog("Buscando Produtos Inativos...");
    let inativos = [];
    try { inativos = await fetchSheet("Produtos Inativos"); addLog(`${inativos.length} inativos carregados.`); }
    catch { addLog("Aba inativos não encontrada — continuando.", "warn"); }

    let catalog = {};
    if (pdfFiles.length > 0) {
      for (const f of pdfFiles) {
        addLog(`Lendo PDF: ${f.name}`);
        const text = await readPdfText(f);
        if (!text || text.length < 50) addLog(`⚠ ${f.name} pode ser scan.`, "warn");
        const parsed = extractCatalog(text);
        const count = Object.keys(parsed).length;
        addLog(`${count} SKUs extraídos de ${f.name}.`, count < 5 ? "warn" : "ok");
        Object.assign(catalog, parsed);
      }
      addLog(`Catálogo total: ${Object.keys(catalog).length} SKUs únicos.`, "ok");
    } else {
      addLog("Sem catálogo PDF — análise sem validação de disponibilidade.", "warn");
    }

    addLog("Executando análise de reposição...");
    const cat = analyze(fluxo, inativos, catalog);
    const total = cat.critica.length+cat.estrela.length+cat.outros.length+cat.sem.length+cat.sugestao.length+cat.fora.length;
    addLog(`Concluído: ${total} itens para reposição.`, "ok");
    renderOutput(cat);
  } catch(err) {
    addLog("❌ Erro: " + err.message, "err");
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4V8z"/></svg> Rodar Análise`;
}
</script>
